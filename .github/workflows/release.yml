name: Release

on:
  push:
    branches: [main]
    paths:
      - 'tractor/**'
      - 'tractor-core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tests/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine version
        id: version
        run: |
          BASE=$(date -u +'%y.%m%d')
          # Check if a release with today's base tag already exists
          EXISTING=$(gh release list --limit 100 --json tagName -q "[.[] | .tagName | select(startswith(\"$BASE\"))] | length")
          if [ "$EXISTING" -eq 0 ]; then
            TAG="$BASE"
          else
            TAG="$BASE.$((EXISTING + 1))"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      TRACTOR_VERSION: ${{ needs.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p tractor

      - name: Run integration tests
        run: bash tests/integration/test.sh

      - name: Run snapshot tests
        run: cargo run --release --bin update-snapshots -- --check

      - name: Upload artifact
        run: cp target/release/tractor tractor-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: tractor-linux-x86_64
          path: tractor-linux-x86_64

  build-macos:
    needs: version
    runs-on: macos-latest
    env:
      TRACTOR_VERSION: ${{ needs.version.outputs.tag }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p tractor

      - name: Upload artifact
        run: cp target/release/tractor tractor-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: tractor-macos-arm64
          path: tractor-macos-arm64

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      TRACTOR_VERSION: ${{ needs.version.outputs.tag }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p tractor

      - name: Upload artifact
        run: cp target/release/tractor.exe tractor-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: tractor-windows-x86_64.exe
          path: tractor-windows-x86_64.exe

      - name: Build Windows installer
        shell: pwsh
        run: |
          Copy-Item target/release/tractor.exe installer/windows/tractor.exe
          Copy-Item web/public/favicon.ico installer/windows/tractor.ico
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVERSION=${{ needs.version.outputs.tag }} installer/windows/tractor.iss
      - uses: actions/upload-artifact@v4
        with:
          name: tractor-${{ needs.version.outputs.tag }}-windows-x86_64-setup.exe
          path: installer/windows/output/tractor-${{ needs.version.outputs.tag }}-windows-x86_64-setup.exe

  release:
    needs: [version, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
          done
          chmod +x release/tractor-linux-* release/tractor-macos-* || true
          ls -la release/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          gh release create "$TAG" release/* \
            --title "Tractor $TAG" \
            --generate-notes \
            --latest
