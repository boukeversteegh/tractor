name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'tractor/**'
              - 'tractor-core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'tests/**'
              - 'installer/**'
              - '.github/workflows/ci.yml'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests (release mode, reuses binary for later steps)
        run: cargo test --workspace --release

      - name: Run integration tests
        run: bash tests/integration/test.sh

      - name: Run snapshot tests
        run: cargo run --release --bin update-snapshots -- --check

  test-windows:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run path-sensitive unit tests
        run: cargo test --workspace --release -j 2 -- normalize_path hashset_intersection windows_prefix absolute_cli_path relative_path_strips

      - name: Build release binary for integration tests
        run: cargo build --release -p tractor

      - name: Run integration tests (absolute paths / scope intersection)
        run: bash tests/integration/run/test.sh

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.7
      - uses: Swatinem/rust-cache@v2

      - name: Build tractor
        run: cargo build --release -p tractor

      - name: Lint
        run: ./target/release/tractor run .tractor.yml

  gate:
    needs: [test, test-windows, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
