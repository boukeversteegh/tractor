version: '3'

vars:
  DIST_DIR: ./dist

includes:
  web:
    taskfile: ./web/Taskfile.yml
    dir: ./web

tasks:
  #############################################################################
  # Grammar patching (override crates.io with git repos)
  #############################################################################

  grammar:patch:
    desc: "Patch a grammar with a git repo. Usage: task grammar:patch CRATE=tree-sitter-c-sharp REPO=tree-sitter/tree-sitter-c-sharp"
    requires:
      vars: [CRATE, REPO]
    cmds:
      - |
        # Add [patch.crates-io] section if it doesn't exist
        if ! grep -q '^\[patch\.crates-io\]' Cargo.toml; then
          echo "" >> Cargo.toml
          echo "# Grammar patches (managed by: task grammar:patch)" >> Cargo.toml
          echo "[patch.crates-io]" >> Cargo.toml
        fi

        # Remove existing patch for this crate if present (git or legacy path)
        sed -i '/^{{.CRATE}} = { git/d' Cargo.toml
        sed -i '/^{{.CRATE}} = { path/d' Cargo.toml
        # Clean up legacy comment if present
        sed -i '/^# Local grammar patches/d' Cargo.toml

        # Add the git patch (Cargo.lock pins the exact commit)
        echo '{{.CRATE}} = { git = "https://github.com/{{.REPO}}" }' >> Cargo.toml
        echo "Patched {{.CRATE}} -> {{.REPO}} (run cargo update -p {{.CRATE}} to refresh)"

  grammar:unpatch:
    desc: "Remove a grammar patch. Usage: task grammar:unpatch CRATE=tree-sitter-c-sharp"
    requires:
      vars: [CRATE]
    cmds:
      - |
        if grep -q '^{{.CRATE}} = { git' Cargo.toml; then
          sed -i '/^{{.CRATE}} = { git/d' Cargo.toml
          echo "Removed patch for {{.CRATE}}"
        elif grep -q '^{{.CRATE}} = { path' Cargo.toml; then
          sed -i '/^{{.CRATE}} = { path/d' Cargo.toml
          echo "Removed legacy path patch for {{.CRATE}}"
        else
          echo "No patch found for {{.CRATE}}"
        fi

  grammar:unpatch-all:
    desc: Remove all grammar patches
    cmds:
      - |
        sed -i '/^tree-sitter-.* = { git/d' Cargo.toml
        sed -i '/^tree-sitter-.* = { path/d' Cargo.toml
        sed -i '/^# Grammar patches/d' Cargo.toml
        sed -i '/^\[patch\.crates-io\]$/{ N; /^\[patch\.crates-io\]\n$/d }' Cargo.toml
        echo "Removed all grammar patches"

  grammar:patch-csharp:
    desc: Patch C# grammar with latest from source (has C# 12 primary constructor fix)
    cmds:
      - task: grammar:patch
        vars:
          CRATE: tree-sitter-c-sharp
          REPO: tree-sitter/tree-sitter-c-sharp

  grammar:list-patches:
    desc: List currently patched grammars
    cmds:
      - |
        echo "Current grammar patches:"
        grep -E '^tree-sitter-.* = \{ (git|path)' Cargo.toml 2>/dev/null || echo "  (none)"

  # === tractor (Rust XPath CLI) ===

  build:
    desc: Build tractor (release)
    cmds:
      - cargo build --release -p tractor

  install:
    desc: Build and install tractor to ~/.cargo/bin
    cmds:
      - cargo install --path tractor

  run:
    desc: Run tractor with arguments
    cmds:
      - cargo run --release -p tractor --bin tractor -- {{.CLI_ARGS}}

  test:
    desc: Run all tests (Rust, TypeScript, integration)
    cmds:
      - cargo test --workspace
      - task: web:test
      - task: test:snapshots
      - task: test:integration

  test:integration:
    desc: Run integration tests
    deps: [build]
    cmds:
      - bash tests/integration/test.sh

  test:snapshots:
    desc: Check that XML snapshots match current tractor output
    deps: [build]
    cmds:
      - cargo run --release --bin update-snapshots -- --check

  test:snapshots:update:
    desc: Regenerate XML snapshots from current tractor output
    deps: [build]
    cmds:
      - cargo run --release --bin update-snapshots
      # Bash-driven snapshot cases (formats/set/ needs tempfiles, path
      # normalisation, stdin piping — richer than the Rust updater handles).
      # UPDATE=1 makes test.sh overwrite snapshots instead of diffing.
      - UPDATE=1 bash tests/integration/formats/set/test.sh

  # === Distribution builds ===

  dist:linux:
    desc: Build for Linux (via Docker)
    cmds:
      - mkdir -p {{.DIST_DIR}}/linux-x64
      - docker build -t tractor-builder -f Dockerfile.build .
      - docker run --rm -v "{{.PWD}}:/src" tractor-builder
          cargo build --release --target x86_64-unknown-linux-gnu
      - cp target/x86_64-unknown-linux-gnu/release/tractor {{.DIST_DIR}}/linux-x64/
    vars:
      PWD:
        sh: pwd

  dist:windows:
    desc: Build for Windows (native)
    cmds:
      - mkdir -p {{.DIST_DIR}}/windows-x64
      - cargo build --release
      - cp target/release/tractor.exe {{.DIST_DIR}}/windows-x64/

  dist:windows-installer:
    desc: Build Windows installer (requires Inno Setup and Windows)
    deps: [dist:windows]
    vars:
      VERSION: '{{.VERSION | default "dev"}}'
    cmds:
      - cp {{.DIST_DIR}}/windows-x64/tractor.exe installer/windows/tractor.exe
      - cp web/public/favicon.ico installer/windows/tractor.ico
      - iscc /DVERSION={{.VERSION}} installer/windows/tractor.iss
      - cp installer/windows/output/tractor-{{.VERSION}}-windows-x86_64-setup.exe {{.DIST_DIR}}/

  # === Setup ===

  setup:sccache:
    desc: Install sccache for faster Rust builds (compilation cache)
    internal: true
    status:
      - command -v sccache
    cmds:
      - |
        echo "Installing sccache..."
        VERSION="v0.14.0"
        case "$(uname -s)" in
          MINGW*|MSYS*|CYGWIN*|*_NT*)
            ARCHIVE="sccache-${VERSION}-x86_64-pc-windows-msvc"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${VERSION}/${ARCHIVE}.tar.gz" -o /tmp/sccache.tar.gz
            tar -xzf /tmp/sccache.tar.gz -C /tmp/
            cp "/tmp/${ARCHIVE}/sccache.exe" "$HOME/.cargo/bin/"
            rm -rf /tmp/sccache.tar.gz "/tmp/${ARCHIVE}"
            ;;
          Linux*)
            ARCHIVE="sccache-${VERSION}-x86_64-unknown-linux-musl"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${VERSION}/${ARCHIVE}.tar.gz" -o /tmp/sccache.tar.gz
            tar -xzf /tmp/sccache.tar.gz -C /tmp/
            cp "/tmp/${ARCHIVE}/sccache" "$HOME/.cargo/bin/"
            rm -rf /tmp/sccache.tar.gz "/tmp/${ARCHIVE}"
            ;;
          Darwin*)
            ARCHIVE="sccache-${VERSION}-aarch64-apple-darwin"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${VERSION}/${ARCHIVE}.tar.gz" -o /tmp/sccache.tar.gz
            tar -xzf /tmp/sccache.tar.gz -C /tmp/
            cp "/tmp/${ARCHIVE}/sccache" "$HOME/.cargo/bin/"
            rm -rf /tmp/sccache.tar.gz "/tmp/${ARCHIVE}"
            ;;
        esac
        echo "sccache installed: $(sccache --version)"

  setup:
    desc: Set up development environment
    cmds:
      - task: setup:sccache

  setup:fly-deploy:
    desc: Configure Fly.io deploy token as GitHub Actions secret
    cmds:
      - fly tokens create deploy -a tractor | gh secret set FLY_API_TOKEN

  # === Maintenance ===

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/
      - rm -rf target/
      - task: web:clean
