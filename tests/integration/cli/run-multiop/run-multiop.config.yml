operations:
  - check:
      files: ["../../sample.cs"]
      language: csharp
      rules:
        - id: no-class
          xpath: "//class"
          reason: "class declaration found"
          severity: error
        - id: no-void-method
          xpath: "//method[returns/type='void']"
          reason: "void method found"
          severity: warning
  - test:
      files: ["../../sample.cs"]
      language: csharp
      assertions:
        - xpath: "//class"
          expect: some
        - xpath: "//interface"
          expect: none
