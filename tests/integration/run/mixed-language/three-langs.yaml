# Three different languages in one config
check:
  files:
    - "*.js"
    - "*.md"
    - "*.yaml"
  rules:
    - id: no-todo-js
      language: javascript
      xpath: "//comment[contains(., 'TODO')]"
      reason: "TODO comment found"
      severity: error

    - id: no-todo-md
      language: markdown
      xpath: "//html[contains(., 'TODO')]"
      reason: "TODO comment found"
      severity: warning

    - id: yaml-no-debug
      language: yaml
      xpath: "//debug[.='true']"
      reason: "Debug mode must be disabled"
      severity: error
