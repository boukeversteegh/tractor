# Three different languages in one config
check:
  files:
    - "*.js"
    - "*.md"
    - "*.yaml"
  rules:
    - id: js-no-specs
      language: javascript
      xpath: "//comment[contains(., '@specs/')]"
      reason: "Wrong prefix"
      severity: error
    
    - id: md-too-long
      language: markdown
      xpath: "(//document[@end_line > 50]//heading)[1]"
      reason: "Spec too long"
      severity: warning
    
    - id: yaml-no-debug
      language: yaml
      xpath: "//debug[.='true']"
      reason: "Debug mode must be disabled"
      severity: error
