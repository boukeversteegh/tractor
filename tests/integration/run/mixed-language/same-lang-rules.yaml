# Multiple rules for same language
check:
  files:
    - "*.js"
  rules:
    - id: no-todo
      language: javascript
      xpath: "//comment[contains(., 'TODO')]"
      reason: "TODO comment found"
      severity: error
    - id: no-console-log
      language: javascript
      xpath: "//call[descendant::property[.='log']]"
      reason: "No console.log calls allowed"
      severity: warning
