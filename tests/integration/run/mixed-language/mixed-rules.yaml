# Config with rules for multiple languages - tests mixed-language rule configs
check:
  files:
    - "*.js"
    - "*.md"
  rules:
    - id: no-todo-js
      language: javascript
      xpath: "//comment[contains(., 'TODO')]"
      reason: "TODO comment found"
      severity: error

    - id: no-todo-md
      language: markdown
      xpath: "//html[contains(., 'TODO')]"
      reason: "TODO comment found"
      severity: warning
