- $type: class
  public: true
  name: Calculator
  body:
    children:
    - $type: method
      public: true
      returns:
        type: int
      name: Add
      parameters:
      - type: int
        name: a
      - type: int
        name: b
      body:
        block:
          children:
          - $type: return
            children:
            - $type: binary
              left:
                ref: a
              right:
                ref: b
              children:
              - $type: op
                plus: true
                text: +
    - $type: method
      public: true
      returns:
        type: int
      name: Subtract
      parameters:
      - type: int
        name: a
      - type: int
        name: b
      body:
        block:
          children:
          - $type: return
            children:
            - $type: binary
              left:
                ref: a
              right:
                ref: b
              children:
              - $type: op
                minus: true
                text: '-'
    - $type: method
      public: true
      returns:
        type: int
      name: Multiply
      parameters:
      - type: int
        name: a
      - type: int
        name: b
      body:
        block:
          children:
          - $type: return
            children:
            - $type: binary
              left:
                ref: a
              right:
                ref: b
              children:
              - $type: op
                multiply: true
                text: '*'
- $type: class
  public: true
  name: Greeter
  body:
    children:
    - $type: method
      public: true
      returns:
        type: string
      name: Hello
      parameters:
        type: string
        name: name
      body:
        block:
          children:
          - $type: return
            children:
            - $type: binary
              left:
                string:
                  children:
                  - string_literal_content: Hello,
              right:
                ref: name
              children:
              - $type: op
                plus: true
                text: +
    - $type: method
      public: true
      returns:
        type: string
      name: Goodbye
      parameters:
        type: string
        name: name
      body:
        block:
          children:
          - $type: return
            children:
            - $type: binary
              left:
                string:
                  children:
                  - string_literal_content: Goodbye,
              right:
                ref: name
              children:
              - $type: op
                plus: true
                text: +
