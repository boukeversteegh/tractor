$type: class
public: true
name: Calculator
body:
  children:
  - $type: method
    public: true
    returns:
      type: int
    name: Add
    parameters:
      children:
      - $type: parameter
        type: int
        name: a
      - $type: parameter
        type: int
        name: b
    body:
      block:
        children:
        - $type: return
          children:
          - $type: binary
            left:
              ref: a
            right:
              ref: b
            children:
            - $type: op
              plus: true
              text: +
  - $type: method
    public: true
    returns:
      type: int
    name: Subtract
    parameters:
      children:
      - $type: parameter
        type: int
        name: a
      - $type: parameter
        type: int
        name: b
    body:
      block:
        children:
        - $type: return
          children:
          - $type: binary
            left:
              ref: a
            right:
              ref: b
            children:
            - $type: op
              minus: true
              text: '-'
  - $type: method
    public: true
    returns:
      type: int
    name: Multiply
    parameters:
      children:
      - $type: parameter
        type: int
        name: a
      - $type: parameter
        type: int
        name: b
    body:
      block:
        children:
        - $type: return
          children:
          - $type: binary
            left:
              ref: a
            right:
              ref: b
            children:
            - $type: op
              multiply: true
              text: '*'
