$type: class
public: true
name:
  bind: true
  text: Calculator
body:
  children:
  - $type: method
    public: true
    returns:
      type: int
    name:
      bind: true
      text: Add
    parameters:
    - type: int
      name:
        bind: true
        text: a
    - type: int
      name:
        bind: true
        text: b
    body:
      block:
        children:
        - $type: return
          children:
          - $type: binary
            left:
              name:
                use: true
                text: a
            right:
              name:
                use: true
                text: b
            children:
            - $type: op
              plus: true
              text: +
  - $type: method
    public: true
    returns:
      type: int
    name:
      bind: true
      text: Subtract
    parameters:
    - type: int
      name:
        bind: true
        text: a
    - type: int
      name:
        bind: true
        text: b
    body:
      block:
        children:
        - $type: return
          children:
          - $type: binary
            left:
              name:
                use: true
                text: a
            right:
              name:
                use: true
                text: b
            children:
            - $type: op
              minus: true
              text: '-'
  - $type: method
    public: true
    returns:
      type: int
    name:
      bind: true
      text: Multiply
    parameters:
    - type: int
      name:
        bind: true
        text: a
    - type: int
      name:
        bind: true
        text: b
    body:
      block:
        children:
        - $type: return
          children:
          - $type: binary
            left:
              name:
                use: true
                text: a
            right:
              name:
                use: true
                text: b
            children:
            - $type: op
              multiply: true
              text: '*'
