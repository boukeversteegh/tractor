# Lint rules for tractor's own codebase.
# Run: tractor run tractor/tractor-lint.yaml

check:
  files:
    - "src/**/*.rs"
  rules:
    # Every renderer's main entry point (public function taking &Report)
    # must accept a dimensions parameter. This ensures all formats can
    # participate in the grouping system, even if they ignore dimensions.
    - id: renderer-accepts-dimensions
      xpath: "//function[pub][starts-with(name,'render_')][contains(params,'&Report')][not(contains(params,'dimensions'))]"
      reason: "public render function taking &Report must accept dimensions parameter"
      severity: error
      include:
        - "src/pipeline/format/*.rs"
      exclude:
        - "**/mod.rs"
        - "**/options.rs"
        - "**/shared.rs"

    # Structs that derive Deserialize must also have
    # #[serde(deny_unknown_fields)] to catch typos in config files.
    # See: https://github.com/boukeversteegh/tractor/issues/68
    - id: deserialize-deny-unknown-fields
      xpath: >-
        //attribute_item[contains(.,"Deserialize")][
          not(
            following-sibling::*[1][self::attribute_item][contains(.,"deny_unknown_fields")]
            or following-sibling::*[2][self::attribute_item][contains(.,"deny_unknown_fields")]
          )
        ]
      reason: "Deserialize struct must have #[serde(deny_unknown_fields)] to reject typos"
      severity: error
