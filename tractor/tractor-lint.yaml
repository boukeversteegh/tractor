# Lint rules for tractor's own renderer consistency.
# Run: tractor run tractor/tractor-lint.yaml
#
# Ensures format renderers use the shared helpers from shared.rs,
# preventing drift where one format gets a fix and another doesn't.
#
# Applies to all renderer files in the format directory.
# Infrastructure files (mod.rs, options.rs, shared.rs) are excluded
# via per-rule include patterns that only match renderer files.

check:
  files:
    - "src/pipeline/format/*.rs"
  exclude:
    - "**/mod.rs"
    - "**/options.rs"
    - "**/shared.rs"
  rules:
    # Every renderer must import from shared.rs for consistent
    # field emission decisions across formats.
    - id: renderer-uses-shared-helpers
      xpath: "//file[not(.//use[contains(.,'shared')])]"
      reason: "renderer must import from shared.rs (field emission helpers)"
      severity: error
